---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'docker-bake.hcl'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # to push tags and create releases
      id-token: write    # to sign the attestation
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        id: tagging
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: master
          INITIAL_VERSION: 1.0.0
          BRANCH_HISTORY: last
      - name: Set up QEMU
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay.io
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_BOT_USERNAME }}
          password: ${{ secrets.QUAY_BOT_PASSWORD }}

      - name: Login to ghcr.io
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          push: true
          provenance: true
          files: |
            docker-bake.hcl
          set: |
            k8s-sidecar.tags=docker.io/kiwigrid/k8s-sidecar:${{ steps.tagging.outputs.new_tag }}
            k8s-sidecar.tags=quay.io/kiwigrid/k8s-sidecar:${{ steps.tagging.outputs.new_tag }}
            k8s-sidecar.tags=ghcr.io/kiwigrid/k8s-sidecar:${{ steps.tagging.outputs.new_tag }}

      - name: Build Changelog
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@348e88fab4c37338b1e803ceb2d4a7a5db6c0833 # v6.2.2
        with:
          configuration: ".github/workflows/release-notes-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b #v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tagging.outputs.new_tag }}
          name: v${{ steps.tagging.outputs.new_tag }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: false
