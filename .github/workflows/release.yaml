---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'docker-bake.hcl'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # to push tags and create releases
      id-token: write    # to sign the attestation
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        id: tagging
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: master
          INITIAL_VERSION: 1.0.0
          BRANCH_HISTORY: last
      - name: Set up QEMU
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to DockerHub
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay.io
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_BOT_USERNAME }}
          password: ${{ secrets.QUAY_BOT_PASSWORD }}

      - name: Login to ghcr.io
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          push: true
          provenance: true
          files: |
            docker-bake.hcl
          set: |
            k8s-sidecar.tags=docker.io/kiwigrid/k8s-sidecar:${{ steps.tagging.outputs.new_tag }}
            k8s-sidecar.tags=quay.io/kiwigrid/k8s-sidecar:${{ steps.tagging.outputs.new_tag }}
            k8s-sidecar.tags=ghcr.io/kiwigrid/k8s-sidecar:${{ steps.tagging.outputs.new_tag }}

      - name: Build Changelog
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@348e88fab4c37338b1e803ceb2d4a7a5db6c0833 # v6.2.2
        with:
          configuration: ".github/workflows/release-notes-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.tagging.outputs.part != '' && steps.tagging.outputs.part != 'none'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b #v2.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tagging.outputs.new_tag }}
          name: v${{ steps.tagging.outputs.new_tag }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: false
          prerelease: false
